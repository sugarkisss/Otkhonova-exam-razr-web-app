{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm border-0 mx-auto bg-white" style="max-width: 400px; margin-top: 80px;">
    <h3 class="text-center fw-bold text-dark">Авторизация</h3>
    <p class="text-center text-muted small">Вход в систему АИС «Библиотека»</p>
    <hr>
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-bold">Логин</label>
            <input type="text" name="login" class="form-control" required placeholder="Введите ваш логин">
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Пароль</label>
            <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" name="remember" class="form-check-input" id="rememberMe">
            <label class="form-check-label small text-secondary" for="rememberMe">Запомнить меня</label>
        </div>
        
        <button type="submit" class="btn btn-dark w-100 fw-bold mt-2 py-2">Войти</button>
    </form>
</div>
{% endblock %}
